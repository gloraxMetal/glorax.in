<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="doriBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282828" />
      <stop offset="100%" stop-color="#101010" />
    </linearGradient>
    <linearGradient id="goldCopper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3a870" />
      <stop offset="50%" stop-color="#d4a853" />
      <stop offset="100%" stop-color="#b87333" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#doriBg)" />
  
  <!-- Fine copper dori (thin wires) bundled coils -->
  <g fill="none" stroke="url(#goldCopper)" opacity="0.8">
    <ellipse cx="200" cy="180" rx="140" ry="70" stroke-width="2" />
    <ellipse cx="205" cy="182" rx="138" ry="68" stroke-width="1.5" />
    <ellipse cx="195" cy="178" rx="142" ry="72" stroke-width="2.5" />
    <ellipse cx="200" cy="180" rx="130" ry="60" stroke-width="3" />
    <ellipse cx="202" cy="179" rx="125" ry="58" stroke-width="1" />
    <ellipse cx="198" cy="181" rx="135" ry="65" stroke-width="2.2" />
    
    <!-- Wire ties holding the coil together -->
    <rect x="90" y="150" width="10" height="60" rx="2" fill="#5c2e0b" stroke="none" transform="rotate(-10 95 180)" />
    <rect x="290" y="150" width="10" height="60" rx="2" fill="#5c2e0b" stroke="none" transform="rotate(10 295 180)" />
    <rect x="195" y="110" width="10" height="30" rx="2" fill="#5c2e0b" stroke="none" transform="rotate(90 200 125)" />
  </g>
  
  <!-- Technical text -->
  <rect x="20" y="20" width="360" height="50" rx="4" fill="#1c1c1c" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="35" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ IMAGE 5: COPPER DORI ]</text>
  <text x="35" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested: Fine bright copper wire coils / winding wire</text>
</svg>
