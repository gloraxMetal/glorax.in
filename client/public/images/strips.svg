<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="stripBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2c2c" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8a05e" />
      <stop offset="30%" stop-color="#b87333" />
      <stop offset="70%" stop-color="#e3a870" />
      <stop offset="100%" stop-color="#7c4612" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#stripBg)" />
  
  <!-- Curled metal shapes representing strips -->
  <g stroke="url(#metalGrad)" stroke-width="8" fill="none" opacity="0.85">
    <path d="M 50 150 C 50 80, 150 80, 150 150 S 250 220, 250 150 S 350 80, 350 150" />
    <path d="M 60 170 C 60 100, 160 100, 160 170 S 260 240, 260 170 S 360 100, 360 170" stroke-width="4" />
    <path d="M 40 130 C 40 60, 140 60, 140 130 S 240 200, 240 130 S 340 60, 340 130" stroke-width="6" />
    
    <!-- Flat metal strip shapes stacked -->
    <path d="M 30,220 L 370,220" stroke-width="12" stroke-linecap="round" />
    <path d="M 50,240 L 350,240" stroke-width="10" stroke-linecap="round" />
  </g>
  
  <!-- Technical text -->
  <rect x="20" y="20" width="360" height="50" rx="4" fill="#1c1c1c" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="35" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ IMAGE 1: COPPER STRIPS (PATTI) ]</text>
  <text x="35" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested: Curled metal strips / Flat copper busbars</text>
</svg>
