<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="tallyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#222222" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <linearGradient id="rustyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b4513" />
      <stop offset="50%" stop-color="#5c2e0b" />
      <stop offset="70%" stop-color="#7c4612" />
      <stop offset="100%" stop-color="#3d1d03" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#tallyBg)" />
  
  <!-- Rusty scrap metal pile shapes -->
  <g fill="url(#rustyGrad)" stroke="#1a0d05" stroke-width="2" opacity="0.9">
    <!-- Stack of irregular trapezoids/polygon "tally" shapes -->
    <polygon points="50,250 90,200 160,200 180,250" />
    <polygon points="120,260 150,210 220,210 240,260" />
    <polygon points="180,240 210,190 280,190 310,240" />
    <polygon points="260,270 290,220 350,220 370,270" />
    
    <!-- Row 2 -->
    <polygon points="80,210 110,170 180,170 190,210" />
    <polygon points="160,220 190,160 250,160 270,220" />
    <polygon points="230,200 255,150 310,150 330,200" />
    
    <!-- Top row -->
    <polygon points="130,170 155,120 210,120 230,170" />
    <polygon points="190,170 220,110 275,110 295,170" />
  </g>
  
  <!-- Technical text -->
  <rect x="20" y="20" width="360" height="50" rx="4" fill="#1c1c1c" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="35" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ IMAGE 2: COPPER TALLY ]</text>
  <text x="35" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested: Darker, rusty copper scrap pieces / briquettes</text>
</svg>
