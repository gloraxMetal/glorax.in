<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="rassaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
    <linearGradient id="wireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b87333" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#92400e" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#rassaBg)" />
  
  <!-- Thick braided copper wire bundle representation -->
  <g fill="none" opacity="0.9">
    <!-- Outer thick ropes -->
    <path d="M -20,150 Q 100,50 200,150 T 420,150" stroke="url(#wireGrad)" stroke-width="24" stroke-linecap="round" />
    <!-- Braided pattern overlay (strokes tracing the helix) -->
    <path d="M -20,150 Q 100,50 200,150 T 420,150" stroke="#7c2d12" stroke-width="24" stroke-dasharray="10 15" stroke-linecap="round" />
    
    <path d="M -20,180 Q 100,80 200,180 T 420,180" stroke="url(#wireGrad)" stroke-width="16" stroke-linecap="round" />
    <path d="M -20,180 Q 100,80 200,180 T 420,180" stroke="#7c2d12" stroke-width="16" stroke-dasharray="8 12" stroke-linecap="round" />

    <path d="M -20,120 Q 100,20 200,120 T 420,120" stroke="url(#wireGrad)" stroke-width="18" stroke-linecap="round" />
    <path d="M -20,120 Q 100,20 200,120 T 420,120" stroke="#7c2d12" stroke-width="18" stroke-dasharray="12 10" stroke-linecap="round" />
  </g>
  
  <!-- Technical text -->
  <rect x="20" y="20" width="360" height="50" rx="4" fill="#1c1c1c" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="35" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ IMAGE 3: COPPER RASSA (WIRE) ]</text>
  <text x="35" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested: Thick braided copper wire / Bright bare conductor</text>
</svg>
