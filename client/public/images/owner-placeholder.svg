<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="ownerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1c" />
      <stop offset="100%" stop-color="#2d2d2d" />
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b87333" />
      <stop offset="100%" stop-color="#d4a853" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#ownerBg)" stroke="#b87333" stroke-width="2" />
  
  <!-- Silhouette / Facility representation -->
  <g opacity="0.6">
    <!-- Factory Silhouette in background -->
    <path d="M 50,400 L 50,300 L 150,220 L 150,300 L 250,220 L 250,300 L 350,220 L 350,400 Z" fill="#121212" />
    <rect x="380" y="260" width="120" height="140" fill="#121212" />
    <polygon points="380,260 440,200 500,260" fill="#121212" />
    
    <!-- Chimney -->
    <rect x="80" y="150" width="30" height="100" fill="#121212" />
    <!-- Smoke puffs -->
    <circle cx="95" cy="120" r="10" fill="#333" />
    <circle cx="105" cy="95" r="15" fill="#333" />
  </g>
  
  <!-- Human / Director silhouette in foreground -->
  <g transform="translate(180, 50)" opacity="0.85">
    <circle cx="120" cy="110" r="45" fill="url(#avatarGrad)" />
    <path d="M 40,240 C 40,170 80,165 120,165 C 160,165 200,170 200,240 Z" fill="url(#avatarGrad)" />
  </g>
  
  <!-- Technical text -->
  <rect x="50" y="320" width="500" height="50" rx="4" fill="#111" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="70" y="342" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ INSERT BUSINESS / OWNER / FACILITY PHOTO HERE ]</text>
  <text x="70" y="358" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested size: 600x400px. Professional facility or team photo.</text>
</svg>
