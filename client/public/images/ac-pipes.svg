<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="pipeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242424" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0522d" />
      <stop offset="30%" stop-color="#CD7F32" />
      <stop offset="50%" stop-color="#ffb366" />
      <stop offset="70%" stop-color="#CD7F32" />
      <stop offset="100%" stop-color="#8b4513" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#pipeBg)" />
  
  <!-- Parallel copper tubes stack -->
  <g fill="none" opacity="0.9">
    <!-- Tube 1 -->
    <rect x="30" y="100" width="340" height="25" rx="2" fill="url(#tubeGrad)" stroke="#5c2e0b" stroke-width="1.5" />
    <!-- Inner shadow to show cylindrical form -->
    <line x1="30" y1="105" x2="370" y2="105" stroke="#ffe5cc" stroke-width="1.5" opacity="0.3" />
    <line x1="30" y1="120" x2="370" y2="120" stroke="#3d1d03" stroke-width="2" opacity="0.4" />
    
    <!-- Tube 2 -->
    <rect x="30" y="140" width="340" height="25" rx="2" fill="url(#tubeGrad)" stroke="#5c2e0b" stroke-width="1.5" />
    <line x1="30" y1="145" x2="370" y2="145" stroke="#ffe5cc" stroke-width="1.5" opacity="0.3" />
    <line x1="30" y1="160" x2="370" y2="160" stroke="#3d1d03" stroke-width="2" opacity="0.4" />

    <!-- Tube 3 -->
    <rect x="30" y="180" width="340" height="25" rx="2" fill="url(#tubeGrad)" stroke="#5c2e0b" stroke-width="1.5" />
    <line x1="30" y1="185" x2="370" y2="185" stroke="#ffe5cc" stroke-width="1.5" opacity="0.3" />
    <line x1="30" y1="200" x2="370" y2="200" stroke="#3d1d03" stroke-width="2" opacity="0.4" />
    
    <!-- Bent tube details -->
    <path d="M 50,220 C 150,220 200,240 350,240" stroke="url(#tubeGrad)" stroke-width="15" />
  </g>
  
  <!-- Technical text -->
  <rect x="20" y="20" width="360" height="50" rx="4" fill="#1c1c1c" stroke="#b87333" stroke-width="1" fill-opacity="0.9"/>
  <text x="35" y="42" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#f5f3f0">[ IMAGE 4: AC PIPES (COPPER TUBES) ]</text>
  <text x="35" y="58" font-family="'Inter', sans-serif" font-size="8" fill="#d4a853">Suggested: Straight or coiled copper AC plumbing pipes</text>
</svg>
